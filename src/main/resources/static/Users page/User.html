<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="User.css">
</head>
<body>

<div id="items">

    <!-- Cover banner -->
    <div class="cover">
        <div class="cover-dots"></div>
    </div>

    <!-- Avatar + edit pill -->
    <div class="avatar-area">
        <div class="avatar-ring">
            <img id="profileImage" src="logo.png" alt="Profile photo">
            <div id="avatarBtn" title="Change photo">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.5 6a.5.5 0 0 0 0 1h1a.5.5 0 0 0 0-1h-1zM8 7.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm-1.5-.5a.5.5 0 1 0 0 1 .5.5 0 0 0 0-1zM2 5.5A1.5 1.5 0 0 1 3.5 4h.586l.707-.707A1 1 0 0 1 5.5 3h5a1 1 0 0 1 .707.293L11.914 4H12.5A1.5 1.5 0 0 1 14 5.5v6A1.5 1.5 0 0 1 12.5 13h-9A1.5 1.5 0 0 1 2 11.5v-6zm1.5-.5a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5h-.586a1 1 0 0 1-.707-.293L10.5 4h-5l-.707.707A1 1 0 0 1 4.086 5H3.5z"/>
                </svg>
            </div>
        </div>
        <button class="mode-pill" id="editBtn">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
            </svg>
            Edit profile
        </button>
    </div>

    <!-- Body -->
    <div class="card-body">
        <div class="name-row"><span id="displayName">Your Name</span></div>
        <div class="handle" id="displayEmail">—</div>
        <div class="divider"></div>

        <div id="cred">
            <div class="field">
                <label for="username">Full name</label>
                <div class="field-inner">
                    <svg class="field-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4z"/>
                    </svg>
                    <input id="username" placeholder="Enter your full name" disabled>
                </div>
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <div class="field-inner">
                    <svg class="field-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.708 2.825L15 11.105V5.383zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383v5.722z"/>
                    </svg>
                    <input id="email" type="email" placeholder="Enter your email" disabled>
                </div>
            </div>

            <div class="field">
                <label for="phone">Phone number</label>
                <div class="field-inner">
                    <svg class="field-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.568 17.568 0 0 0 4.168 6.608 17.569 17.569 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.678.678 0 0 0-.58-.122l-2.19.547a1.745 1.745 0 0 1-1.657-.459L5.482 8.062a1.745 1.745 0 0 1-.46-1.657l.548-2.19a.678.678 0 0 0-.122-.58L3.654 1.328z"/>
                    </svg>
                    <input id="phone" type="tel" placeholder="Enter your phone number" disabled>
                </div>
            </div>

            <div id="editBtns" style="display:none;">
                <button class="btn ghost" id="cancelBtn">Cancel</button>
                <button class="btn accent" id="saveBtn">Save changes</button>
            </div>

            <p id="statusMsg"></p>
        </div>
    </div>
</div>

<input type="file" id="imageUpload" style="display:none;" accept="image/*">
<script src="config.js"></script>
<script src="User.js"></script>
</body>
</html>
