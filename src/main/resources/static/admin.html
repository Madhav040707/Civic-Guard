<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic admin's Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
<div id="overlay" class="overlay"></div>
<aside id="d1">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <span class="brand-name">Civic Guard</span>
    </div>

    <nav class="sidebar-nav">
        <button class="button active" onclick="goToProfile()">
            <span class="btn-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            </span>
            Profile
        </button>
        <button class="button" onclick="goToComplaints()">
            ⚠ ALLComplaints
        </button>
        <button class="button" onclick="goToResolved()">
            ✅Resolved
        </button>
        <button class="button" onclick="goToPending()">
            🟡Pending
        </button>
        <button class="button" onclick="goToInProgress()">
            🔄InProgress
        </button>
        <button class="button" onclick="goTOMyReports()">
            <span class="btn-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </span>
            My Reports
        </button>
    </nav>

    <button class="button logout-btn" onclick="logout()">
        <span class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        Logout
    </button>
</aside>

<!-- Main Content -->
<div class="main">
    <header class="top-header">
        <button id="menuToggle" class="menu-btn">☰</button>

        <div class="welcome-block">
            <h1 id="d2">Good morning 👋, User!</h1>
        </div>

        <div class="header-actions">
            <div class="notification-bell">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notif-dot"></span>
            </div>
            <div class="avatar">
                <img id="profileImg" src="logo.png" alt="User">
                <input type="file" id="uploadProfile" accept="image/*">
            </div>
        </div>

    </header>
    <!-- Stats -->
    <div class="stats">
        <div class="stat" id="s1">
            <div class="stat-icon stat-icon-blue">📋</div>
            <div class="stat-info">
                <p class="stat-label">Total Reports</p>
                <h3 class="stat-num" id="p1">0</h3>
            </div>
        </div>
        <div class="stat" id="s2">
            <div class="stat-icon stat-icon-orange">⏳</div>
            <div class="stat-info">
                <p class="stat-label">Pending</p>
                <h3 class="stat-num">0</h3>
            </div>
        </div>
        <div class="stat" id="s3">
            <div class="stat-icon stat-icon-purple">🔄</div>
            <div class="stat-info">
                <p class="stat-label">In Progress</p>
                <h3 class="stat-num">0</h3>
            </div>
        </div>
        <div class="stat" id="s4">
            <div class="stat-icon stat-icon-green">✔️</div>
            <div class="stat-info">
                <p class="stat-label">Resolved</p>
                <h3 class="stat-num">0</h3>
            </div>
        </div>
    </div>

    <!-- Top bar -->
    <div class="top-bar">
        <div class="section-title">Recent Complaints</div>
        <div class="search-box">
            <span class="search-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" placeholder="Search complaints...">
        </div>
    </div>

    <div class="complaints"></div>
    <template id="actionTemplate">
        <div class="action-buttons">
            <button class="pending-btn">Pending</button>
            <button class="progress-btn">In Progress</button>
            <button class="resolved-btn">Resolved</button>
        </div>
    </template>
    </template>
</div>

<!-- FAB -->
<button id="addBtn" title="New Complaint">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Form Modal -->
<div id="formModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>New Complaint</h2>
            <button class="modal-close" onclick="closeForm()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="desc" placeholder="Describe the issue in detail..."></textarea>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" id="category" placeholder="e.g. Road, Sanitation, Lighting...">
        </div>

        <div class="form-group">
            <label>Location</label>
            <button type="button" class="loc-btn" onclick="getMyLocation()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 14 8 14s8-8.75 8-14a8 8 0 0 0-8-8z"/></svg>
                Use My Location
            </button>
            <p id="selectedLocation" class="location-display">No location selected</p>
        </div>

        <div class="form-group">
            <label>Photo Evidence</label>
            <div class="file-drop">
                <input type="file" id="image" accept="image/*">
                <div class="file-drop-label">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Click to upload image</span>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeForm()">Cancel</button>
            <button class="btn-submit" onclick="submitComplaint()">Submit Report</button>
        </div>
    </div>
</div>

<div id="imageModal" class="image-modal">
    <span class="img-close" onclick="closeImage()">✖</span>

    <img id="fullImage">
</div>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
