<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New web</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main">
        <div class="left">
            <div class="container">
                <h1>Welcome 🙏</h1>
                <form onsubmit="event.preventDefault(); login();">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p>New to civic Guard?</p>
                <a href="Register/Register.html">Register</a>
            </div>
        </div>
        <div class="right">
            <div class="card">
                <h2>Report Issues</h2>
                <p>Report road damage, garbage, water issues easily.</p>
            </div>

            <div class="card">
                <h2>Track Complaints</h2>
                <p>Monitor status and resolution progress in real time.</p>
            </div>
            <div class="card">
                <h2>Government Action</h2>
                <p>Authorities take action within defined time limits.</p>
            </div>
        </div>

    </div>
    <script src="config.js"></script>
    <script src="index.js"></script>

</body>
</html>
